<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請求管理 - 配車管理システム</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
        .topnav { background: #3b82f6; color: #fff; display: flex; align-items: center; padding: 0 1rem; height: 56px; gap: 0; }
        .topnav a { color: rgba(255,255,255,.75); text-decoration: none; padding: .75rem 1rem; font-size: .9rem; white-space: nowrap; }
        .topnav a:hover { color: #fff; background: rgba(255,255,255,.1); }
        .topnav a.active { color: #fff; background: rgba(255,255,255,.2); font-weight: 600; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .toolbar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .month-sel { display: flex; align-items: center; gap: .5rem; }
        .month-sel button { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: .4rem .8rem; cursor: pointer; }
        select, input, textarea { border: 1px solid #cbd5e1; border-radius: 6px; padding: .5rem .75rem; font-size: .9rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .stat-card .label { font-size: .85rem; color: #64748b; margin-bottom: .25rem; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; color: #1e293b; }
        .card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: .88rem; }
        th, td { padding: .6rem .75rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8fafc; }
        .btn { display: inline-flex; align-items: center; gap: .3rem; padding: .45rem .9rem; border: none; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-outline { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
        .btn-revert { background: #fff; color: #64748b; border: 1px solid #cbd5e1; font-size: .72rem; padding: .2rem .45rem; }
        .btn-revert:hover { background: #f1f5f9; color: #334155; }
        .btn:hover { opacity: .85; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .badge { padding: .2rem .6rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
        .badge-gray { background: #f1f5f9; color: #64748b; }
        .badge-blue { background: #dbeafe; color: #2563eb; }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-yellow { background: #fef9c3; color: #a16207; }
        .bulk-actions { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; }
        .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
        .text-right { text-align: right; }
        .btn-group { display: inline-flex; gap: .25rem; align-items: center; flex-wrap: wrap; }
        .email-summary { margin: .5rem 0; }
        .email-summary-item { padding: .5rem .75rem; border-radius: 6px; margin-bottom: .4rem; font-size: .88rem; }
        .email-summary-ok { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .email-summary-warn { background: #fefce8; border: 1px solid #fef08a; color: #92400e; }
        @media (max-width: 768px) { .topnav { overflow-x: auto; } .stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/">🚛 配車管理</a>
    <a href="/app/billing" class="active">💰 請求</a>
    <a href="/app/attendance">⏰ 勤怠</a>
    <a href="/app/accounting">📒 会計</a>
    <a href="/app/reports">📝 日報</a>
    <button onclick="openFeedbackModal()" style="background:#f59e0b;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:0.8rem;cursor:pointer;white-space:nowrap;margin-left:auto">📬 開発への依頼</button>
</nav>
<div class="container">
    <h1>請求管理</h1>
    <div class="toolbar">
        <div class="month-sel">
            <button onclick="changeMonth(-1)">◀</button>
            <span id="monthLabel"></span>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <select id="filterStatus" onchange="applyFilter()">
            <option value="">全て</option>
            <option value="未請求">未請求</option>
            <option value="請求済">請求済</option>
            <option value="入金済">入金済</option>
        </select>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="label">月間売上</div><div class="value" id="statRevenue">-</div></div>
        <div class="stat-card"><div class="label">完了件数</div><div class="value" id="statCount">-</div></div>
        <div class="stat-card"><div class="label">平均単価</div><div class="value" id="statAvg">-</div></div>
        <div class="stat-card"><div class="label">未請求額</div><div class="value" id="statUnbilled">-</div></div>
    </div>
    <div class="card">
        <div class="bulk-actions">
            <button class="btn btn-primary" onclick="bulkMarkBilled()">✅ 一括請求済</button>
            <button class="btn btn-warning" onclick="openEmailModal()">📧 メール一括送付</button>
        </div>
        <div style="overflow-x:auto">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
                    <th>案件名</th><th>荷主</th><th>積地→卸地</th><th>配達日</th><th>運賃</th><th>ステータス</th><th>請求状態</th><th>請求日</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tblBody"></tbody>
        </table>
        </div>
    </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
    <div class="modal">
        <h2>📧 請求書メール送付</h2>
        <p style="font-size:.9rem;margin-bottom:.75rem;">以下の取引先に請求書メールを送付します:</p>
        <div id="emailSummary" class="email-summary"></div>
        <div class="form-group"><label>件名</label><input type="text" id="emailSubject" value="請求書のご送付"></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('emailModal')">キャンセル</button>
            <button class="btn btn-primary" id="emailSendBtn" onclick="sendInvoiceEmail()">送信</button>
        </div>
    </div>
</div>

<script>
// --- 認証チェック ---
(function(){
    const token = localStorage.getItem('access_token');
    if (!token) { location.href = '/login'; return; }
    const user = JSON.parse(localStorage.getItem('user_info') || '{}');
    if (user.role === 'dispatcher') { alert('このページにはアクセス権限がありません'); location.href = '/'; return; }
})();

// --- API helpers (JWT付き) ---
const apiBase = '';
function _authH() { const h = {'Content-Type':'application/json'}; const t = localStorage.getItem('access_token'); if(t) h['Authorization']='Bearer '+t; return h; }
async function apiGet(url) { const r = await fetch(apiBase + url, {headers:_authH()}); if(r.status===401){location.href='/login';return[];} if (!r.ok) throw new Error(r.statusText); return r.json(); }
async function apiPost(url, data) { const r = await fetch(apiBase + url, { method: 'POST', headers: _authH(), body: JSON.stringify(data) }); if(r.status===401){location.href='/login';return{};} if (!r.ok) throw new Error(r.statusText); return r.json(); }
async function apiPut(url, data) { const r = await fetch(apiBase + url, { method: 'PUT', headers: _authH(), body: JSON.stringify(data) }); if(r.status===401){location.href='/login';return{};} if (!r.ok) throw new Error(r.statusText); return r.json(); }
async function apiDelete(url) { const r = await fetch(apiBase + url, { method: 'DELETE', headers: _authH() }); if(r.status===401){location.href='/login';return{};} if (!r.ok) throw new Error(r.statusText); return r.json(); }

// --- Modal helpers ---
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// --- Month selector ---
let currentYear, currentMonth;
function initMonth() {
    const d = new Date(); currentYear = d.getFullYear(); currentMonth = d.getMonth() + 1;
    updateMonthLabel();
}
function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    updateMonthLabel(); loadShipments();
}
function updateMonthLabel() {
    document.getElementById('monthLabel').textContent = `${currentYear}年${currentMonth}月`;
}
function yen(n) { return '¥' + (n || 0).toLocaleString(); }

// All shipments from API for the month (unfiltered)
let allShipments = [];
// Displayed shipments (after client-side filter)
let shipments = [];
// Cached clients list
let clientsCache = null;

async function getClients() {
    if (clientsCache) return clientsCache;
    try {
        const data = await apiGet('/api/clients');
        clientsCache = Array.isArray(data) ? data : (data.clients || []);
    } catch (e) {
        console.error('Failed to load clients:', e);
        clientsCache = [];
    }
    return clientsCache;
}

async function loadShipments() {
    try {
        let url = `/api/shipments?year=${currentYear}&month=${currentMonth}`;
        const data = await apiGet(url);
        allShipments = Array.isArray(data) ? data : (data.shipments || []);
        applyFilter();
    } catch (e) { console.error(e); }
}

function applyFilter() {
    const status = document.getElementById('filterStatus').value;
    if (status) {
        shipments = allShipments.filter(s => {
            const invoiceStatus = s.invoice_status || '未請求';
            return invoiceStatus === status;
        });
    } else {
        shipments = [...allShipments];
    }
    renderStats();
    renderTable();
}

function renderStats() {
    // Revenue: sum of price for completed shipments across ALL shipments for the month (not filtered)
    const completed = allShipments.filter(s => s.status === '完了' || s.status === 'completed');
    const revenue = completed.reduce((sum, s) => sum + (s.price || 0), 0);
    const unbilled = allShipments.filter(s => {
        const inv = s.invoice_status || '未請求';
        return inv !== '請求済' && inv !== '入金済';
    }).reduce((sum, s) => sum + (s.price || 0), 0);
    document.getElementById('statRevenue').textContent = yen(revenue);
    document.getElementById('statCount').textContent = completed.length;
    document.getElementById('statAvg').textContent = completed.length ? yen(Math.round(revenue / completed.length)) : '-';
    document.getElementById('statUnbilled').textContent = yen(unbilled);
}

function invoiceBadgeClass(status) {
    if (status === '請求済') return 'badge-blue';
    if (status === '入金済') return 'badge-green';
    return 'badge-gray';
}

function statusBadgeClass(status) {
    if (status === '完了' || status === 'completed') return 'badge-green';
    if (status === '配送中' || status === 'in_progress') return 'badge-yellow';
    return 'badge-gray';
}

function renderTable() {
    const tbody = document.getElementById('tblBody');
    tbody.innerHTML = shipments.map(s => {
        const invoiceStatus = s.invoice_status || '未請求';
        const isBilled = invoiceStatus === '請求済';
        const isPaid = invoiceStatus === '入金済';
        const isUnbilled = invoiceStatus === '未請求';

        let revertBtn = '';
        if (isBilled) {
            revertBtn = `<button class="btn btn-revert" onclick="revertStatus(${s.id}, '未請求')" title="未請求に戻す">戻す</button>`;
        } else if (isPaid) {
            revertBtn = `<button class="btn btn-revert" onclick="revertStatus(${s.id}, '請求済')" title="請求済に戻す">戻す</button>`;
        }

        return `<tr>
        <td><input type="checkbox" class="row-check" value="${s.id}"></td>
        <td>${s.name || s.cargo_name || '-'}</td>
        <td>${s.client_name || '-'}</td>
        <td>${s.pickup_address || '-'} → ${s.delivery_address || '-'}</td>
        <td>${s.delivery_date || '-'}</td>
        <td class="text-right">${yen(s.price)}</td>
        <td><span class="badge ${statusBadgeClass(s.status)}">${s.status || '-'}</span></td>
        <td><span class="badge ${invoiceBadgeClass(invoiceStatus)}">${invoiceStatus}</span></td>
        <td>${s.invoice_date || '-'}</td>
        <td>
            <div class="btn-group">
                <button class="btn btn-primary" style="padding:.3rem .5rem;font-size:.78rem" onclick="markBilled(${s.id})" ${isBilled || isPaid ? 'disabled' : ''}>請求済</button>
                <button class="btn btn-success" style="padding:.3rem .5rem;font-size:.78rem" onclick="markPaid(${s.id})" ${isPaid ? 'disabled' : ''}>入金済</button>
                <button class="btn btn-outline" style="padding:.3rem .5rem;font-size:.78rem" onclick="printSingleInvoice(${s.id})" title="請求書印刷">🖨️</button>
                ${revertBtn}
            </div>
        </td>
    </tr>`;
    }).join('');
}

function getCheckedIds() {
    return [...document.querySelectorAll('.row-check:checked')].map(c => parseInt(c.value));
}
function toggleAll(el) {
    document.querySelectorAll('.row-check').forEach(c => c.checked = el.checked);
}

async function markBilled(id) {
    if (!confirm('この案件を請求済みにしますか？')) return;
    const today = new Date().toISOString().slice(0, 10);
    await apiPut(`/api/shipments/${id}`, { invoice_status: '請求済', invoice_date: today });
    loadShipments();
}

async function markPaid(id) {
    if (!confirm('この案件を入金済みにしますか？')) return;
    const today = new Date().toISOString().slice(0, 10);
    await apiPut(`/api/shipments/${id}`, { invoice_status: '入金済' });
    loadShipments();
}

async function revertStatus(id, targetStatus) {
    const msg = targetStatus === '未請求'
        ? 'この案件を未請求に戻しますか？'
        : 'この案件を請求済に戻しますか？';
    if (!confirm(msg)) return;
    const update = { invoice_status: targetStatus };
    if (targetStatus === '未請求') {
        update.invoice_date = null;
    }
    await apiPut(`/api/shipments/${id}`, update);
    loadShipments();
}

async function bulkMarkBilled() {
    const ids = getCheckedIds();
    if (!ids.length) return alert('請求対象を選択してください');
    if (!confirm(`${ids.length}件を請求済みにしますか？`)) return;
    const today = new Date().toISOString().slice(0, 10);
    await Promise.all(ids.map(id => apiPut(`/api/shipments/${id}`, { invoice_status: '請求済', invoice_date: today })));
    loadShipments();
}

async function printSingleInvoice(id) {
    const s = shipments.find(sh => sh.id === id) || allShipments.find(sh => sh.id === id);
    if (!s) return alert('案件が見つかりません');
    const settings = await apiGet('/api/settings');
    const clients = await getClients();
    const client = clients.find(c => c.name === s.client_name);

    const subtotal = s.price || 0;
    const taxRate = settings.tax_rate || 10;
    const tax = Math.floor(subtotal * taxRate / 100);
    const total = subtotal + tax;
    const today = new Date();
    const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    const invoiceNo = `INV-${currentYear}${String(currentMonth).padStart(2,'0')}-${String(s.id).padStart(4,'0')}`;
    const dueDate = settings.payment_terms?.includes('翌月末') ? '翌月末日' : (settings.payment_terms || '別途ご案内');

    const pw = window.open('', '_blank', 'width=800,height=1100');
    pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>請求書 ${s.client_name}</title>
    <style>
    @page{size:A4;margin:15mm}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;padding:20mm 15mm;color:#000;font-size:10pt;line-height:1.5}
    h1{font-size:22pt;text-align:center;letter-spacing:12pt;margin-bottom:4px;font-weight:700;border-bottom:3px double #000;padding-bottom:8px}
    .inv-header{display:flex;justify-content:space-between;margin:16px 0}
    .inv-header .left{flex:1}
    .inv-header .right{text-align:right;font-size:9pt;line-height:1.8}
    .client-name{font-size:16pt;font-weight:700;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
    .total-box{background:#f0f0f0;border:2px solid #000;padding:12px 20px;text-align:center;margin:16px 0;font-size:14pt;font-weight:700}
    table{width:100%;border-collapse:collapse;margin:12px 0}
    th,td{border:1px solid #000;padding:5px 8px;font-size:9.5pt}
    th{background:#f0f0f0;font-weight:600;text-align:center;white-space:nowrap}
    .summary-table{width:50%;margin-left:auto}
    .summary-table td{text-align:right}
    .summary-table th{text-align:left;width:40%}
    .bank-box{border:1px solid #000;padding:10px;margin:12px 0;font-size:9pt;line-height:1.8}
    .bank-box .bank-title{font-weight:700;margin-bottom:4px}
    .seal{display:inline-block;width:60px;height:60px;border:2px solid #c00;border-radius:50%;text-align:center;line-height:60px;font-size:7pt;color:#c00;font-weight:700;margin-left:8px;vertical-align:middle}
    .footer{margin-top:16px;font-size:8pt;color:#666;text-align:center}
    .company-block{font-size:9pt;line-height:1.8}
    @media print{button{display:none!important}}
    </style></head><body>
    <h1>請 求 書</h1>
    <div class="inv-header">
        <div class="left">
            <div class="client-name">${s.client_name || '-'} 御中</div>
            ${client?.address ? `<div style="font-size:9pt">${client.address}</div>` : ''}
            <div style="margin-top:12px;font-size:10pt">下記の通りご請求申し上げます。</div>
            <div class="total-box">ご請求金額: ¥${total.toLocaleString()}-（税込）</div>
        </div>
        <div class="right">
            <div style="margin-bottom:8px">
                <strong>請求書番号:</strong> ${invoiceNo}<br>
                <strong>発行日:</strong> ${dateStr}<br>
                <strong>お支払期限:</strong> ${dueDate}<br>
                <strong>お支払条件:</strong> ${settings.payment_terms || '-'}
            </div>
            <div class="company-block" style="border:1px solid #ccc;padding:8px;border-radius:4px">
                <strong>${settings.company_name || ''}</strong>
                ${settings.seal_text ? `<span class="seal">${(settings.seal_text||'').substring(0, 6)}</span>` : ''}
                <br>
                〒${settings.postal_code || ''} ${settings.address || ''}<br>
                TEL: ${settings.phone || ''} / FAX: ${settings.fax || ''}<br>
                ${settings.email ? 'E-mail: ' + settings.email + '<br>' : ''}
                ${settings.representative || ''}<br>
                <strong>登録番号: ${settings.registration_number || ''}</strong>
            </div>
        </div>
    </div>

    <table>
        <thead><tr><th style="width:30px">No</th><th style="width:80px">日付</th><th>案件名</th><th>区間</th><th style="width:90px">金額(税抜)</th></tr></thead>
        <tbody>
            <tr>
                <td style="text-align:center">1</td>
                <td>${s.delivery_date || '-'}</td>
                <td>${s.name || '-'}</td>
                <td style="font-size:9pt">${s.pickup_address || ''} → ${s.delivery_address || ''}</td>
                <td style="text-align:right">¥${subtotal.toLocaleString()}</td>
            </tr>
        </tbody>
    </table>

    <table class="summary-table">
        <tr><th>小計</th><td>¥${subtotal.toLocaleString()}</td></tr>
        <tr><th>消費税(${taxRate}%)</th><td>¥${tax.toLocaleString()}</td></tr>
        <tr style="font-weight:700;font-size:11pt"><th>合計（税込）</th><td>¥${total.toLocaleString()}</td></tr>
    </table>

    <div class="bank-box">
        <div class="bank-title">■ お振込先</div>
        ${(settings.bank_info || '').replace(/\\n/g, '<br>').replace(/\n/g, '<br>')}
    </div>

    ${settings.invoice_note ? `<p style="font-size:8.5pt;color:#333;margin-top:8px">※ ${settings.invoice_note}</p>` : ''}

    <div class="footer">
        本請求書は適格請求書（インボイス）として発行しています。<br>
        ${settings.company_name || ''} / 登録番号: ${settings.registration_number || ''} / TEL: ${settings.phone || ''}
    </div>
    <div style="text-align:center;margin-top:16px"><button onclick="window.print()" style="padding:.5rem 1.5rem;font-size:1rem;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff">🖨️ 印刷</button></div>
    </body></html>`);
    pw.document.close();
}

// --- Email modal: group by client, look up billing_email ---
let emailSendData = []; // [{client_name, billing_email, shipment_ids}]

async function openEmailModal() {
    const ids = getCheckedIds();
    if (!ids.length) return alert('送付対象を選択してください');

    const checkedShipments = shipments.filter(s => ids.includes(s.id));
    // Group by client_name
    const groups = {};
    for (const s of checkedShipments) {
        const cn = s.client_name || '不明';
        if (!groups[cn]) groups[cn] = { client_name: cn, client_id: s.client_id, shipment_ids: [] };
        groups[cn].shipment_ids.push(s.id);
    }

    // Look up billing_email from /api/clients
    const clients = await getClients();
    const clientMap = {};
    for (const c of clients) {
        clientMap[c.name] = c;
    }

    emailSendData = [];
    let summaryHtml = '';
    let hasWarning = false;

    for (const key of Object.keys(groups)) {
        const g = groups[key];
        const clientInfo = clientMap[g.client_name];
        const email = clientInfo ? (clientInfo.billing_email || '') : '';
        emailSendData.push({ client_name: g.client_name, billing_email: email, shipment_ids: g.shipment_ids });

        if (email) {
            summaryHtml += `<div class="email-summary-item email-summary-ok">
                <strong>${g.client_name}</strong> (${g.shipment_ids.length}件)<br>
                📧 ${email}
            </div>`;
        } else {
            hasWarning = true;
            summaryHtml += `<div class="email-summary-item email-summary-warn">
                ⚠️ <strong>${g.client_name}</strong> (${g.shipment_ids.length}件): メールアドレス未登録
            </div>`;
        }
    }

    document.getElementById('emailSummary').innerHTML = summaryHtml;
    document.getElementById('emailSubject').value = `${currentYear}年${currentMonth}月 請求書のご送付`;
    document.getElementById('emailSendBtn').disabled = emailSendData.every(d => !d.billing_email);
    openModal('emailModal');
}

async function sendInvoiceEmail() {
    const subject = document.getElementById('emailSubject').value;
    const sendable = emailSendData.filter(d => d.billing_email);
    if (!sendable.length) return alert('送信可能なメールアドレスがありません');

    try {
        await Promise.all(sendable.map(d =>
            apiPost('/api/settings/send-invoice', {
                shipment_ids: d.shipment_ids,
                to: d.billing_email,
                subject: subject
            })
        ));
        closeModal('emailModal');
        alert(`${sendable.length}件の取引先にメールを送信しました`);
    } catch (e) {
        alert('送信エラー: ' + e.message);
    }
}

initMonth();
loadShipments();
</script>
<!-- フィードバックモーダル -->
<div id="feedbackOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h3 style="margin:0;font-size:1.1rem">📬 開発への依頼</h3>
            <button onclick="closeFeedbackModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#64748b">&times;</button>
        </div>
        <form id="feedbackForm" onsubmit="submitFeedback(event)">
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">カテゴリ</label>
                <select id="fb-category" required style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                    <option value="機能追加">機能追加</option>
                    <option value="不具合報告">不具合報告</option>
                    <option value="改善要望">改善要望</option>
                    <option value="UI変更">UI変更</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">タイトル</label>
                <input id="fb-title" type="text" required placeholder="依頼の概要を一言で" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">詳細</label>
                <textarea id="fb-desc" required rows="4" placeholder="具体的な内容を記載してください" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;resize:vertical"></textarea>
            </div>
            <div style="display:flex;gap:12px;margin-bottom:12px">
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">優先度</label>
                    <select id="fb-priority" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                        <option>低</option><option selected>普通</option><option>高</option><option>緊急</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">対象ページ</label>
                    <input id="fb-page" type="text" readonly style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;background:#f1f5f9;box-sizing:border-box">
                </div>
            </div>
            <div style="margin-bottom:16px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">スクリーンショット</label>
                <div id="fb-drop-zone" style="border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer" onclick="document.getElementById('fb-screenshot').click()" ondragover="event.preventDefault();this.style.borderColor='#3b82f6'" ondragleave="this.style.borderColor='#d1d5db'" ondrop="handleScreenshotDrop(event)">
                    <input type="file" id="fb-screenshot" accept="image/*" style="display:none" onchange="previewScreenshot(this)">
                    <div id="fb-drop-text" style="color:#94a3b8;font-size:0.85rem">📎 クリックまたはドラッグ&ドロップで画像を添付</div>
                    <img id="fb-preview" style="display:none;max-width:100%;max-height:150px;border-radius:6px;margin-top:8px">
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="button" onclick="closeFeedbackModal()" style="padding:8px 16px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer">キャンセル</button>
                <button type="submit" id="fb-submit-btn" style="padding:8px 20px;border:none;border-radius:6px;background:#f59e0b;color:#fff;font-weight:600;cursor:pointer">送信</button>
            </div>
        </form>
        <div id="fb-success" style="display:none;text-align:center;padding:30px 0">
            <div style="font-size:2rem;margin-bottom:8px">✅</div>
            <div style="font-weight:600;font-size:1.1rem">依頼を送信しました！</div>
            <div style="color:#64748b;font-size:0.85rem;margin-top:4px">開発チームが確認します</div>
        </div>
    </div>
</div>
<script>
function openFeedbackModal(){const o=document.getElementById('feedbackOverlay');o.style.display='flex';document.getElementById('feedbackForm').style.display='block';document.getElementById('fb-success').style.display='none';document.getElementById('fb-page').value=document.title||location.pathname;document.getElementById('fb-title').value='';document.getElementById('fb-desc').value='';document.getElementById('fb-preview').style.display='none';document.getElementById('fb-drop-text').style.display='block';document.getElementById('fb-screenshot').value='';}
function closeFeedbackModal(){document.getElementById('feedbackOverlay').style.display='none';}
function previewScreenshot(i){if(i.files&&i.files[0]){const r=new FileReader();r.onload=e=>{document.getElementById('fb-preview').src=e.target.result;document.getElementById('fb-preview').style.display='block';document.getElementById('fb-drop-text').style.display='none';};r.readAsDataURL(i.files[0]);}}
function handleScreenshotDrop(e){e.preventDefault();e.currentTarget.style.borderColor='#d1d5db';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const i=document.getElementById('fb-screenshot');const d=new DataTransfer();d.items.add(f);i.files=d.files;previewScreenshot(i);}}
async function submitFeedback(e){e.preventDefault();const b=document.getElementById('fb-submit-btn');b.disabled=true;b.textContent='送信中...';const f=new FormData();f.append('category',document.getElementById('fb-category').value);f.append('title',document.getElementById('fb-title').value);f.append('description',document.getElementById('fb-desc').value);f.append('priority',document.getElementById('fb-priority').value);f.append('page',document.getElementById('fb-page').value);const u=JSON.parse(localStorage.getItem('user')||'{}');f.append('user_name',u.name||'');f.append('user_email',u.email||'');const s=document.getElementById('fb-screenshot').files[0];if(s)f.append('screenshot',s);try{const t=localStorage.getItem('access_token');const h=t?{'Authorization':'Bearer '+t}:{};const r=await fetch('/api/feedback',{method:'POST',headers:h,body:f});if(r.ok){document.getElementById('feedbackForm').style.display='none';document.getElementById('fb-success').style.display='block';setTimeout(closeFeedbackModal,2000);}else{alert('送信に失敗しました');}}catch(x){alert('送信エラー: '+x.message);}b.disabled=false;b.textContent='送信';}
document.getElementById('feedbackOverlay').addEventListener('click',function(e){if(e.target===this)closeFeedbackModal();});
</script>
