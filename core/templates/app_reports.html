<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日報管理 - 配車管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
        .topnav { background: #14b8a6; color: #fff; display: flex; align-items: center; padding: 0 1rem; height: 56px; gap: 0; }
        .topnav a { color: rgba(255,255,255,.75); text-decoration: none; padding: .75rem 1rem; font-size: .9rem; white-space: nowrap; }
        .topnav a:hover { color: #fff; background: rgba(255,255,255,.15); }
        .topnav a.active { color: #fff; background: rgba(255,255,255,.25); font-weight: 600; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .toolbar { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        select, input, textarea { border: 1px solid #cbd5e1; border-radius: 6px; padding: .5rem .75rem; font-size: .9rem; }
        .card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        th, td { padding: .5rem .6rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8fafc; }
        .btn { display: inline-flex; align-items: center; gap: .3rem; padding: .45rem .9rem; border: none; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #14b8a6; color: #fff; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-outline { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
        .btn:hover { opacity: .85; }
        .btn-nav { background: #0d9488; color: #fff; padding: .45rem .65rem; font-size: 1rem; min-width: 36px; justify-content: center; }
        .route-tag { display: inline-block; background: #f0fdfa; color: #0d9488; padding: .15rem .5rem; border-radius: 4px; font-size: .78rem; margin: .1rem; }
        .summary-bar { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .summary-item { background: #fff; border-radius: 10px; padding: 1rem 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); min-width: 140px; flex: 1; }
        .summary-item .label { font-size: .78rem; color: #64748b; margin-bottom: .25rem; }
        .summary-item .value { font-size: 1.35rem; font-weight: 700; color: #14b8a6; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 650px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: .85rem; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
        .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
        .no-data { text-align: center; padding: 2rem; color: #94a3b8; }
        @media (max-width: 768px) {
            .topnav { overflow-x: auto; }
            .form-row, .form-row-3 { grid-template-columns: 1fr; }
            .summary-bar { gap: .75rem; }
            .summary-item { min-width: 100px; }
        }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/">🚛 配車管理</a>
    <a href="/app/billing">💰 請求</a>
    <a href="/app/attendance">⏰ 勤怠</a>
    <a href="/app/accounting">📒 会計</a>
    <a href="/app/reports" class="active">📝 日報</a>
    <button onclick="openFeedbackModal()" style="background:#f59e0b;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:0.8rem;cursor:pointer;white-space:nowrap;margin-left:auto">📬 開発への依頼</button>
</nav>
<div class="container">
    <h1>日報管理</h1>
    <div class="toolbar">
        <button class="btn btn-nav" onclick="changeDate(-1)" title="前日">◀</button>
        <input type="date" id="targetDate" onchange="loadReports()">
        <button class="btn btn-nav" onclick="changeDate(1)" title="翌日">▶</button>
        <select id="driverFilter" onchange="applyFilter()" style="min-width:140px">
            <option value="">全ドライバー</option>
        </select>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
        <!-- 自動生成削除済み -->
        <button class="btn btn-outline" onclick="printDaily()">🖨️ 日報印刷</button>
    </div>

    <div class="summary-bar" id="summaryBar">
        <div class="summary-item"><div class="label">件数</div><div class="value" id="sumCount">0</div></div>
        <div class="summary-item"><div class="label">総走行距離</div><div class="value" id="sumDistance">0 km</div></div>
        <div class="summary-item"><div class="label">総給油量</div><div class="value" id="sumFuel">0 L</div></div>
        <div class="summary-item"><div class="label">待機時間計</div><div class="value" id="sumWaiting">0 分</div></div>
        <div class="summary-item"><div class="label">積込時間計</div><div class="value" id="sumLoading">0 分</div></div>
        <div class="summary-item"><div class="label">荷卸時間計</div><div class="value" id="sumUnloading">0 分</div></div>
    </div>

    <div class="card" style="overflow-x:auto">
        <table>
            <thead><tr>
                <th>日付</th><th>ドライバー</th><th>出発</th><th>帰着</th><th>待機</th><th>積込</th><th>荷卸</th><th>走行km</th><th>給油L</th><th>荷主</th><th>運行経路</th><th>備考</th><th>操作</th>
            </tr></thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="formModal">
    <div class="modal">
        <h2 id="formTitle">日報追加</h2>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group"><label>日付</label><input type="date" id="fDate"></div>
            <div class="form-group"><label>ドライバー</label><select id="fDriver"></select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>出発時刻</label><input type="time" id="fStartTime"></div>
            <div class="form-group"><label>帰着時刻</label><input type="time" id="fEndTime"></div>
        </div>
        <div class="form-row-3">
            <div class="form-group"><label>待機時間(分)</label><input type="number" id="fWaiting" value="0"></div>
            <div class="form-group"><label>積込時間(分)</label><input type="number" id="fLoading" value="0"></div>
            <div class="form-group"><label>荷卸時間(分)</label><input type="number" id="fUnloading" value="0"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>走行距離(km)</label><input type="number" id="fDistance" step="0.1"></div>
            <div class="form-group"><label>給油量(L)</label><input type="number" id="fFuel" step="0.1"></div>
        </div>
        <div class="form-group"><label>荷主</label><input type="text" id="fClientNames"></div>
        <div class="form-group">
            <label>運行経路 (JSON: [{"pickup":"...","delivery":"..."},...])</label>
            <textarea id="fRoutes" rows="3" placeholder='[{"pickup":"東京","delivery":"大阪"}]'></textarea>
        </div>
        <div class="form-group"><label>備考</label><textarea id="fNotes" rows="2"></textarea></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('formModal')">キャンセル</button>
            <button class="btn btn-primary" onclick="saveReport()">保存</button>
        </div>
    </div>
</div>

<script>
// --- 認証チェック ---
(function(){
    const token = localStorage.getItem('access_token');
    if (!token) { location.href = '/login'; return; }
    const user = JSON.parse(localStorage.getItem('user_info') || '{}');
    if (user.role === 'dispatcher') { alert('このページにはアクセス権限がありません'); location.href = '/'; return; }
})();

function _authH() { const h = {'Content-Type':'application/json'}; const t = localStorage.getItem('access_token'); if(t) h['Authorization']='Bearer '+t; return h; }
async function apiGet(u){const r=await fetch(u,{headers:_authH()});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPost(u,d){const r=await fetch(u,{method:'POST',headers:_authH(),body:JSON.stringify(d)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPut(u,d){const r=await fetch(u,{method:'PUT',headers:_authH(),body:JSON.stringify(d)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiDelete(u){const r=await fetch(u,{method:'DELETE',headers:_authH()});if(!r.ok)throw new Error(r.statusText);return r.json();}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

let allReports = [], filteredReports = [], drivers = [];

function initDate(){
    document.getElementById('targetDate').value = new Date().toISOString().slice(0,10);
}

function changeDate(delta){
    const input = document.getElementById('targetDate');
    const d = new Date(input.value);
    d.setDate(d.getDate() + delta);
    input.value = d.toISOString().slice(0,10);
    loadReports();
}

async function loadDrivers(){
    try {
        const data = await apiGet('/api/drivers');
        drivers = Array.isArray(data) ? data : (data.drivers || []);
        const fDriver = document.getElementById('fDriver');
        fDriver.innerHTML = drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
        const filterSel = document.getElementById('driverFilter');
        filterSel.innerHTML = '<option value="">全ドライバー</option>' +
            drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
    } catch(e){console.error(e);}
}

async function loadReports(){
    try {
        const date = document.getElementById('targetDate').value;
        let url = '/api/reports';
        if(date) url += `?date=${date}`;
        const data = await apiGet(url);
        allReports = Array.isArray(data) ? data : (data.reports || []);
        applyFilter();
    } catch(e){console.error(e);}
}

function applyFilter(){
    const driverId = document.getElementById('driverFilter').value;
    if(driverId){
        filteredReports = allReports.filter(r => String(r.driver_id) === driverId);
    } else {
        filteredReports = [...allReports];
    }
    renderTable();
    renderSummary();
}

function parseRoutes(r){
    if(!r) return '';
    try {
        const routes = typeof r === 'string' ? JSON.parse(r) : r;
        if(!Array.isArray(routes)) return String(r);
        return routes.map(rt => `<span class="route-tag">${rt.pickup||'?'} → ${rt.delivery||'?'}</span>`).join(' ');
    } catch(e){ return String(r); }
}

function driverName(id){ const d=drivers.find(x=>x.id===id); return d?d.name:'-'; }

function renderTable(){
    if(filteredReports.length === 0){
        document.getElementById('tblBody').innerHTML = '<tr><td colspan="13" class="no-data">データがありません</td></tr>';
        return;
    }
    document.getElementById('tblBody').innerHTML = filteredReports.map(r => `<tr>
        <td>${r.date||'-'}</td>
        <td>${r.driver_name||driverName(r.driver_id)}</td>
        <td>${r.start_time||'-'}</td><td>${r.end_time||'-'}</td>
        <td>${r.waiting_time||0}</td><td>${r.loading_time||0}</td><td>${r.unloading_time||0}</td>
        <td>${r.distance_km||'-'}</td><td>${r.fuel_liters||'-'}</td>
        <td>${r.client_names||'-'}</td>
        <td>${parseRoutes(r.routes)}</td>
        <td>${r.notes||''}</td>
        <td style="white-space:nowrap">
            <button class="btn btn-outline" style="padding:.2rem .5rem;font-size:.78rem" onclick="editReport(${r.id})">編集</button>
            <button class="btn btn-danger" style="padding:.2rem .5rem;font-size:.78rem" onclick="deleteReport(${r.id})">削除</button>
        </td>
    </tr>`).join('');
}

function renderSummary(){
    const list = filteredReports;
    const sumDist = list.reduce((s,r)=>s+(parseFloat(r.distance_km)||0),0);
    const sumFuel = list.reduce((s,r)=>s+(parseFloat(r.fuel_liters)||0),0);
    const sumWait = list.reduce((s,r)=>s+(parseInt(r.waiting_time)||0),0);
    const sumLoad = list.reduce((s,r)=>s+(parseInt(r.loading_time)||0),0);
    const sumUnload = list.reduce((s,r)=>s+(parseInt(r.unloading_time)||0),0);
    document.getElementById('sumCount').textContent = list.length;
    document.getElementById('sumDistance').textContent = sumDist.toFixed(1) + ' km';
    document.getElementById('sumFuel').textContent = sumFuel.toFixed(1) + ' L';
    document.getElementById('sumWaiting').textContent = sumWait + ' 分';
    document.getElementById('sumLoading').textContent = sumLoad + ' 分';
    document.getElementById('sumUnloading').textContent = sumUnload + ' 分';
}

function openAddModal(){
    document.getElementById('editId').value='';
    document.getElementById('formTitle').textContent='日報追加';
    document.getElementById('fDate').value=document.getElementById('targetDate').value;
    ['fStartTime','fEndTime','fClientNames','fNotes'].forEach(id=>document.getElementById(id).value='');
    ['fWaiting','fLoading','fUnloading'].forEach(id=>document.getElementById(id).value=0);
    document.getElementById('fDistance').value='';
    document.getElementById('fFuel').value='';
    document.getElementById('fRoutes').value='';
    openModal('formModal');
}

function editReport(id){
    const r=allReports.find(x=>x.id===id); if(!r) return;
    document.getElementById('editId').value=id;
    document.getElementById('formTitle').textContent='日報編集';
    document.getElementById('fDate').value=r.date||'';
    document.getElementById('fDriver').value=r.driver_id||'';
    document.getElementById('fStartTime').value=r.start_time||'';
    document.getElementById('fEndTime').value=r.end_time||'';
    document.getElementById('fWaiting').value=r.waiting_time||0;
    document.getElementById('fLoading').value=r.loading_time||0;
    document.getElementById('fUnloading').value=r.unloading_time||0;
    document.getElementById('fDistance').value=r.distance_km||'';
    document.getElementById('fFuel').value=r.fuel_liters||'';
    document.getElementById('fClientNames').value=r.client_names||'';
    document.getElementById('fRoutes').value=typeof r.routes==='string'?r.routes:JSON.stringify(r.routes||[]);
    document.getElementById('fNotes').value=r.notes||'';
    openModal('formModal');
}

async function saveReport(){
    const id=document.getElementById('editId').value;
    let routes=document.getElementById('fRoutes').value;
    try { JSON.parse(routes); } catch(e){ routes='[]'; }
    const payload={
        date:document.getElementById('fDate').value,
        driver_id:parseInt(document.getElementById('fDriver').value),
        start_time:document.getElementById('fStartTime').value,
        end_time:document.getElementById('fEndTime').value,
        waiting_time:parseInt(document.getElementById('fWaiting').value)||0,
        loading_time:parseInt(document.getElementById('fLoading').value)||0,
        unloading_time:parseInt(document.getElementById('fUnloading').value)||0,
        distance_km:parseFloat(document.getElementById('fDistance').value)||0,
        fuel_liters:parseFloat(document.getElementById('fFuel').value)||0,
        client_names:document.getElementById('fClientNames').value,
        routes:routes,
        notes:document.getElementById('fNotes').value,
    };
    try {
        if(id) await apiPut(`/api/reports/${id}`,payload);
        else await apiPost('/api/reports',payload);
        closeModal('formModal');
        loadReports();
    } catch(e){
        alert('保存に失敗しました: ' + e.message);
    }
}

async function deleteReport(id){
    if(!confirm('削除しますか？'))return;
    try {
        await apiDelete(`/api/reports/${id}`);
        loadReports();
    } catch(e){
        alert('削除に失敗しました: ' + e.message);
    }
}

async function autoGenerate(){
    const date=document.getElementById('targetDate').value;
    if(!date) return alert('日付を選択してください');
    if(!confirm(`${date}の日報を配車データから自動生成しますか？`)) return;
    try {
        await apiPost(`/api/reports/auto-generate?target_date=${date}`,{});
        loadReports();
    } catch(e){
        alert('自動生成に失敗しました: ' + e.message);
    }
}

function printDaily(){
    const date=document.getElementById('targetDate').value;
    const list=filteredReports;
    const sumDist=list.reduce((s,r)=>s+(parseFloat(r.distance_km)||0),0);
    const sumFuel=list.reduce((s,r)=>s+(parseFloat(r.fuel_liters)||0),0);
    const sumWait=list.reduce((s,r)=>s+(parseInt(r.waiting_time)||0),0);
    const sumLoad=list.reduce((s,r)=>s+(parseInt(r.loading_time)||0),0);
    const sumUnload=list.reduce((s,r)=>s+(parseInt(r.unloading_time)||0),0);
    const win=window.open('','_blank');
    win.document.write(`<html><head><meta charset="UTF-8"><title>日報 ${date}</title><style>
        body{font-family:sans-serif;padding:2rem}table{width:100%;border-collapse:collapse;margin-top:1rem}
        th,td{border:1px solid #ccc;padding:.5rem;text-align:left;font-size:.85rem}th{background:#f0f0f0}
        h1{font-size:1.3rem}.summary{margin-top:1rem;font-size:.9rem;color:#555}
        .total-row td{font-weight:700;background:#f8fafc}
        @media print{.no-print{display:none}}</style></head><body>
        <h1>運行日報 ${date}</h1>
        <table><thead><tr><th>ドライバー</th><th>出発</th><th>帰着</th><th>待機</th><th>積込</th><th>荷卸</th><th>走行km</th><th>給油L</th><th>荷主</th><th>経路</th><th>備考</th></tr></thead><tbody>
        ${list.map(r=>`<tr><td>${r.driver_name||driverName(r.driver_id)}</td><td>${r.start_time||'-'}</td><td>${r.end_time||'-'}</td><td>${r.waiting_time||0}</td><td>${r.loading_time||0}</td><td>${r.unloading_time||0}</td><td>${r.distance_km||'-'}</td><td>${r.fuel_liters||'-'}</td><td>${r.client_names||'-'}</td><td>${routesText(r.routes)}</td><td>${r.notes||''}</td></tr>`).join('')}
        <tr class="total-row"><td>合計 (${list.length}件)</td><td colspan="2"></td><td>${sumWait}</td><td>${sumLoad}</td><td>${sumUnload}</td><td>${sumDist.toFixed(1)}</td><td>${sumFuel.toFixed(1)}</td><td colspan="3"></td></tr>
        </tbody></table>
        <button class="no-print" onclick="window.print()" style="margin-top:1rem;padding:.5rem 1rem;cursor:pointer">印刷</button></body></html>`);
}

function routesText(r){
    try{const arr=typeof r==='string'?JSON.parse(r):r;if(!Array.isArray(arr))return String(r||'');return arr.map(rt=>`${rt.pickup||'?'}→${rt.delivery||'?'}`).join(', ');}catch(e){return String(r||'');}
}

initDate(); loadDrivers().then(()=>loadReports());
</script>
<!-- フィードバックモーダル -->
<div id="feedbackOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h3 style="margin:0;font-size:1.1rem">📬 開発への依頼</h3>
            <button onclick="closeFeedbackModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#64748b">&times;</button>
        </div>
        <form id="feedbackForm" onsubmit="submitFeedback(event)">
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">カテゴリ</label>
                <select id="fb-category" required style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                    <option value="機能追加">機能追加</option>
                    <option value="不具合報告">不具合報告</option>
                    <option value="改善要望">改善要望</option>
                    <option value="UI変更">UI変更</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">タイトル</label>
                <input id="fb-title" type="text" required placeholder="依頼の概要を一言で" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">詳細</label>
                <textarea id="fb-desc" required rows="4" placeholder="具体的な内容を記載してください" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;resize:vertical"></textarea>
            </div>
            <div style="display:flex;gap:12px;margin-bottom:12px">
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">優先度</label>
                    <select id="fb-priority" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                        <option>低</option><option selected>普通</option><option>高</option><option>緊急</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">対象ページ</label>
                    <input id="fb-page" type="text" readonly style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;background:#f1f5f9;box-sizing:border-box">
                </div>
            </div>
            <div style="margin-bottom:16px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">スクリーンショット</label>
                <div id="fb-drop-zone" style="border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer" onclick="document.getElementById('fb-screenshot').click()" ondragover="event.preventDefault();this.style.borderColor='#3b82f6'" ondragleave="this.style.borderColor='#d1d5db'" ondrop="handleScreenshotDrop(event)">
                    <input type="file" id="fb-screenshot" accept="image/*" style="display:none" onchange="previewScreenshot(this)">
                    <div id="fb-drop-text" style="color:#94a3b8;font-size:0.85rem">📎 クリックまたはドラッグ&ドロップで画像を添付</div>
                    <img id="fb-preview" style="display:none;max-width:100%;max-height:150px;border-radius:6px;margin-top:8px">
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="button" onclick="closeFeedbackModal()" style="padding:8px 16px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer">キャンセル</button>
                <button type="submit" id="fb-submit-btn" style="padding:8px 20px;border:none;border-radius:6px;background:#f59e0b;color:#fff;font-weight:600;cursor:pointer">送信</button>
            </div>
        </form>
        <div id="fb-success" style="display:none;text-align:center;padding:30px 0">
            <div style="font-size:2rem;margin-bottom:8px">✅</div>
            <div style="font-weight:600;font-size:1.1rem">依頼を送信しました！</div>
            <div style="color:#64748b;font-size:0.85rem;margin-top:4px">開発チームが確認します</div>
        </div>
    </div>
</div>
<script>
function openFeedbackModal(){const o=document.getElementById('feedbackOverlay');o.style.display='flex';document.getElementById('feedbackForm').style.display='block';document.getElementById('fb-success').style.display='none';document.getElementById('fb-page').value=document.title||location.pathname;document.getElementById('fb-title').value='';document.getElementById('fb-desc').value='';document.getElementById('fb-preview').style.display='none';document.getElementById('fb-drop-text').style.display='block';document.getElementById('fb-screenshot').value='';}
function closeFeedbackModal(){document.getElementById('feedbackOverlay').style.display='none';}
function previewScreenshot(i){if(i.files&&i.files[0]){const r=new FileReader();r.onload=e=>{document.getElementById('fb-preview').src=e.target.result;document.getElementById('fb-preview').style.display='block';document.getElementById('fb-drop-text').style.display='none';};r.readAsDataURL(i.files[0]);}}
function handleScreenshotDrop(e){e.preventDefault();e.currentTarget.style.borderColor='#d1d5db';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const i=document.getElementById('fb-screenshot');const d=new DataTransfer();d.items.add(f);i.files=d.files;previewScreenshot(i);}}
async function submitFeedback(e){e.preventDefault();const b=document.getElementById('fb-submit-btn');b.disabled=true;b.textContent='送信中...';const f=new FormData();f.append('category',document.getElementById('fb-category').value);f.append('title',document.getElementById('fb-title').value);f.append('description',document.getElementById('fb-desc').value);f.append('priority',document.getElementById('fb-priority').value);f.append('page',document.getElementById('fb-page').value);const u=JSON.parse(localStorage.getItem('user')||'{}');f.append('user_name',u.name||'');f.append('user_email',u.email||'');const s=document.getElementById('fb-screenshot').files[0];if(s)f.append('screenshot',s);try{const t=localStorage.getItem('access_token');const h=t?{'Authorization':'Bearer '+t}:{};const r=await fetch('/api/feedback',{method:'POST',headers:h,body:f});if(r.ok){document.getElementById('feedbackForm').style.display='none';document.getElementById('fb-success').style.display='block';setTimeout(closeFeedbackModal,2000);}else{alert('送信に失敗しました');}}catch(x){alert('送信エラー: '+x.message);}b.disabled=false;b.textContent='送信';}
document.getElementById('feedbackOverlay').addEventListener('click',function(e){if(e.target===this)closeFeedbackModal();});
</script>
</body>
</html>
