<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勤怠管理 - 配車管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
        .topnav { background: #f59e0b; color: #fff; display: flex; align-items: center; padding: 0 1rem; height: 56px; gap: 0; }
        .topnav a { color: rgba(255,255,255,.75); text-decoration: none; padding: .75rem 1rem; font-size: .9rem; white-space: nowrap; }
        .topnav a:hover { color: #fff; background: rgba(255,255,255,.15); }
        .topnav a.active { color: #fff; background: rgba(255,255,255,.2); font-weight: 600; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .toolbar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .month-sel { display: flex; align-items: center; gap: .5rem; }
        .month-sel button { background: #f59e0b; color: #fff; border: none; border-radius: 6px; padding: .4rem .8rem; cursor: pointer; font-size: 1rem; }
        .month-sel button:hover { background: #d97706; }
        .month-sel span { font-size: 1.1rem; font-weight: 600; min-width: 140px; text-align: center; }
        select, input, textarea { border: 1px solid #cbd5e1; border-radius: 6px; padding: .5rem .75rem; font-size: .9rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .stat-card .label { font-size: .85rem; color: #64748b; margin-bottom: .25rem; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; color: #1e293b; }
        .stat-card.highlight { border-left: 4px solid #f59e0b; }
        .card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        th, td { padding: .5rem .6rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
        tr:hover { background: #f8fafc; }
        .btn { display: inline-flex; align-items: center; gap: .3rem; padding: .45rem .9rem; border: none; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #f59e0b; color: #fff; }
        .btn-primary:hover { background: #d97706; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-outline { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn:hover { opacity: .85; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Alert */
        .alert { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; display: none; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        /* Driver info card */
        .driver-info { display: flex; align-items: center; gap: 1.5rem; padding: 1rem 1.25rem; background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; margin-bottom: 1.5rem; }
        .driver-info .name { font-size: 1.1rem; font-weight: 700; }
        .driver-info .detail { font-size: .85rem; color: #64748b; }
        .driver-info .leave-badge { background: #22c55e; color: #fff; padding: .3rem .8rem; border-radius: 9999px; font-size: .85rem; font-weight: 600; }

        /* Calendar */
        .calendar { margin-bottom: 1.5rem; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 1px; }
        .cal-header div { background: #f59e0b; color: #fff; text-align: center; padding: .5rem; font-weight: 600; font-size: .85rem; }
        .cal-header div.sat { background: #3b82f6; }
        .cal-header div.sun { background: #ef4444; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e2e8f0; }
        .cal-cell { background: #fff; min-height: 100px; padding: .4rem; cursor: pointer; position: relative; transition: background .15s; }
        .cal-cell:hover { background: #fffbeb; }
        .cal-cell.empty { background: #f8fafc; cursor: default; }
        .cal-cell.empty:hover { background: #f8fafc; }
        .cal-cell .day-num { font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
        .cal-cell.sat .day-num { color: #3b82f6; }
        .cal-cell.sun .day-num { color: #ef4444; }
        .cal-cell .type-dot { width: 100%; height: 4px; border-radius: 2px; margin-bottom: .25rem; }
        .cal-cell .time-text { font-size: .7rem; color: #64748b; line-height: 1.4; }
        .cal-cell .vehicle-tag { font-size: .6rem; color: #fff; background: #64748b; padding: .05rem .3rem; border-radius: 3px; display: inline-block; margin-top: .1rem; }
        .cal-cell .wtype-label { font-size: .65rem; padding: .1rem .3rem; border-radius: 3px; color: #fff; display: inline-block; margin-top: .15rem; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 2vh; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 95%; max-width: 700px; max-height: 92vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; }
        .modal-section { margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 1px solid #e2e8f0; }
        .modal-section:last-of-type { border-bottom: none; }
        .modal-section h3 { font-size: .9rem; font-weight: 700; color: #f59e0b; margin-bottom: .75rem; padding-left: .25rem; border-left: 3px solid #f59e0b; }
        .form-group { margin-bottom: .85rem; }
        .form-group label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .25rem; color: #475569; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
        .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }

        .badge { padding: .2rem .6rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
        .btn-group { display: inline-flex; gap: .25rem; }

        /* Driver list cards */
        .driver-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
        .driver-card {
            background: #fff; border-radius: 10px; padding: 1rem 1.25rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer;
            transition: all .2s; border: 2px solid transparent;
            display: flex; align-items: center; gap: 1rem;
        }
        .driver-card:hover { border-color: #f59e0b; background: #fffbeb; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.12); }
        .driver-card .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: #f59e0b; color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; flex-shrink: 0;
        }
        .driver-card .info { flex: 1; min-width: 0; }
        .driver-card .name { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; }
        .driver-card .meta { font-size: .8rem; color: #64748b; display: flex; gap: .75rem; flex-wrap: wrap; }
        .driver-card .stats-mini { display: flex; gap: .5rem; margin-top: .4rem; }
        .driver-card .stat-chip {
            font-size: .7rem; padding: .15rem .5rem; border-radius: 9999px; font-weight: 600;
        }
        .stat-chip.days { background: #dbeafe; color: #1e40af; }
        .stat-chip.overtime { background: #fef3c7; color: #92400e; }
        .stat-chip.leave { background: #dcfce7; color: #166534; }

        @media (max-width: 768px) {
            .topnav { overflow-x: auto; }
            .stats { grid-template-columns: 1fr 1fr; }
            .cal-cell { min-height: 70px; }
            .cal-cell .time-text { font-size: .6rem; }
            .form-row, .form-row-3 { grid-template-columns: 1fr; }
            .modal { max-width: 98%; padding: 1rem; }
        }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/">🚛 配車管理</a>
    <a href="/app/billing">💰 請求</a>
    <a href="/app/attendance" class="active">⏰ 勤怠</a>
    <a href="/app/accounting">📒 会計</a>
    <a href="/app/reports">📝 日報</a>
    <button onclick="openFeedbackModal()" style="background:#f59e0b;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:0.8rem;cursor:pointer;white-space:nowrap;margin-left:auto">📬 開発への依頼</button>
</nav>

<div class="container">
    <h1>勤怠管理</h1>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="month-sel">
            <button onclick="changeMonth(-1)">◀</button>
            <span id="monthLabel"></span>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <select id="driverFilter" onchange="onDriverChange()">
            <option value="">-- ドライバー選択 --</option>
        </select>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
        <!-- 配車から自動生成 削除済み -->
        <button class="btn btn-outline" onclick="exportCSV()">📥 CSV出力</button>
    </div>

    <!-- 改善基準告示アラート -->
    <div class="alert alert-info" id="alertRestraint">📋 拘束時間: <span id="alertRestraintText"></span></div>
    <div class="alert alert-warning" id="alertOvertimeWarn">⚠️ 時間外労働警告: <span id="alertOvertimeWarnText"></span></div>
    <div class="alert alert-danger" id="alertOvertimeDanger">🚨 時間外労働危険: <span id="alertOvertimeDangerText"></span></div>
    <div class="alert alert-warning" id="alertRestWarn">⚠️ 休息期間不足: <span id="alertRestWarnText"></span></div>

    <!-- Stats -->
    <div class="stats" id="statsArea">
        <div class="stat-card highlight"><div class="label">出勤日数</div><div class="value" id="sDays">0</div></div>
        <div class="stat-card"><div class="label">時間外労働(h)</div><div class="value" id="sOvertime">0</div></div>
        <div class="stat-card"><div class="label">月間拘束時間(h)</div><div class="value" id="sRestraint">0</div></div>
        <div class="stat-card"><div class="label">最短休息時間(h)</div><div class="value" id="sMinRest">-</div></div>
        <div class="stat-card"><div class="label">有給残日数</div><div class="value" id="sLeaveBalance">-</div></div>
        <div class="stat-card"><div class="label">有給使用日数</div><div class="value" id="sLeaveUsed">0</div></div>
    </div>

    <!-- Driver info + Calendar (shown when driver selected) -->
    <div id="calendarSection" style="display:none;">
        <div class="driver-info" id="driverInfoCard">
            <div>
                <div class="name" id="diName">-</div>
                <div class="detail" id="diDetail">-</div>
            </div>
            <div class="leave-badge" id="diLeave">有給残: - 日</div>
        </div>

        <div class="card calendar">
            <div class="cal-header">
                <div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div><div class="sun">日</div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <!-- Driver list (shown only when NO driver is selected) -->
    <div id="driverListSection" style="display:none;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
            <h2 style="font-size:1.1rem;">ドライバー一覧</h2>
            <span style="font-size:.85rem; color:#64748b;" id="driverListCount"></span>
        </div>
        <div class="driver-list" id="driverListGrid"></div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modalTitle">勤怠登録</h2>
        <input type="hidden" id="fId">

        <!-- 基本情報セクション -->
        <div class="modal-section">
            <h3>基本情報</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>日付</label>
                    <input type="date" id="fDate">
                </div>
                <div class="form-group">
                    <label>ドライバー</label>
                    <select id="fDriver"></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>出勤</label>
                    <input type="time" id="fStart">
                </div>
                <div class="form-group">
                    <label>退勤</label>
                    <input type="time" id="fEnd">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>休憩(分)</label>
                    <input type="number" id="fBreak" value="60" min="0">
                </div>
                <div class="form-group">
                    <label>勤務種別</label>
                    <select id="fWorkType">
                        <option value="通常">通常</option>
                        <option value="休日">休日</option>
                        <option value="有給">有給</option>
                        <option value="半休">半休</option>
                        <option value="欠勤">欠勤</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 運行情報セクション -->
        <div class="modal-section">
            <h3>運行情報</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>車両</label>
                    <select id="fVehicle">
                        <option value="">-- 選択 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>走行距離(km)</label>
                    <input type="number" id="fDistance" min="0" step="0.1" value="">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>出庫時間</label>
                    <input type="time" id="fDeparture">
                </div>
                <div class="form-group">
                    <label>帰庫時間</label>
                    <input type="time" id="fReturn">
                </div>
            </div>
            <div class="form-group">
                <label>運行経路</label>
                <input type="text" id="fRoutes" placeholder="例: 東京→大阪→名古屋">
            </div>
        </div>

        <!-- 点呼セクション -->
        <div class="modal-section">
            <h3>点呼</h3>
            <div class="form-row-3">
                <div class="form-group">
                    <label>出庫前点呼</label>
                    <input type="time" id="fPreCheck">
                </div>
                <div class="form-group">
                    <label>帰庫後点呼</label>
                    <input type="time" id="fPostCheck">
                </div>
                <div class="form-group">
                    <label>アルコール検知</label>
                    <select id="fAlcohol">
                        <option value="">--</option>
                        <option value="異常なし">異常なし</option>
                        <option value="要確認">要確認</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 作業時間セクション -->
        <div class="modal-section">
            <h3>作業時間</h3>
            <div class="form-row-3">
                <div class="form-group">
                    <label>待機時間(分)</label>
                    <input type="number" id="fWaiting" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>積込時間(分)</label>
                    <input type="number" id="fLoading" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>荷卸時間(分)</label>
                    <input type="number" id="fUnloading" value="0" min="0">
                </div>
            </div>
        </div>

        <!-- 給油・高速セクション -->
        <div class="modal-section">
            <h3>給油・高速</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>給油量(L)</label>
                    <input type="number" id="fFuelLiters" min="0" step="0.1" value="">
                </div>
                <div class="form-group">
                    <label>給油金額(円)</label>
                    <input type="number" id="fFuelCost" min="0" value="">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>高速代(円)</label>
                    <input type="number" id="fHighwayCost" min="0" value="">
                </div>
                <div class="form-group">
                    <label>高速区間</label>
                    <input type="text" id="fHighwaySections" placeholder="例: 東名高速 東京IC-名古屋IC">
                </div>
            </div>
        </div>

        <!-- その他セクション -->
        <div class="modal-section">
            <h3>その他</h3>
            <div class="form-row-3">
                <div class="form-group">
                    <label>休憩場所</label>
                    <input type="text" id="fBreakLocation" placeholder="例: 海老名SA">
                </div>
                <div class="form-group">
                    <label>天候</label>
                    <select id="fWeather">
                        <option value="">--</option>
                        <option value="晴">晴</option>
                        <option value="曇">曇</option>
                        <option value="雨">雨</option>
                        <option value="雪">雪</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>手当(円)</label>
                    <input type="number" id="fAllowance" min="0" value="">
                </div>
            </div>
            <div class="form-group">
                <label>事故・故障</label>
                <textarea id="fIncidents" rows="2" placeholder="事故や故障があれば記入"></textarea>
            </div>
            <div class="form-group">
                <label>備考</label>
                <textarea id="fNotes" rows="2"></textarea>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
            <button class="btn btn-primary" onclick="saveRecord()">保存</button>
        </div>
    </div>
</div>

<script>
// --- 認証チェック ---
(function(){
    const token = localStorage.getItem('access_token');
    if (!token) { location.href = '/login'; return; }
})();

function _authH() { const h = {'Content-Type':'application/json'}; const t = localStorage.getItem('access_token'); if(t) h['Authorization']='Bearer '+t; return h; }

// ===== State =====
let currentYear, currentMonth;
let drivers = [];
let vehicles = [];
let records = [];
let selectedDriverId = '';

// ===== Init =====
(function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    updateMonthLabel();
    loadDrivers();
    loadVehicles();
})();

function updateMonthLabel() {
    document.getElementById('monthLabel').textContent = `${currentYear}年${currentMonth}月`;
}

function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    updateMonthLabel();
    loadRecords();
}

// ===== Drivers =====
async function loadDrivers() {
    try {
        const res = await fetch('/api/drivers', { headers: _authH() });
        drivers = await res.json();
        const filter = document.getElementById('driverFilter');
        const fDriver = document.getElementById('fDriver');
        filter.innerHTML = '<option value="">-- ドライバー選択 --</option>';
        fDriver.innerHTML = '';
        drivers.forEach(d => {
            if (d.status === '退職') return;
            filter.innerHTML += `<option value="${d.id}">${d.name}</option>`;
            fDriver.innerHTML += `<option value="${d.id}">${d.name}</option>`;
        });
    } catch (e) {
        console.error('ドライバー読込失敗:', e);
    }
    loadRecords();
}

// ===== Vehicles =====
async function loadVehicles() {
    try {
        const res = await fetch('/api/vehicles', { headers: _authH() });
        vehicles = await res.json();
        const fVehicle = document.getElementById('fVehicle');
        fVehicle.innerHTML = '<option value="">-- 選択 --</option>';
        vehicles.forEach(v => {
            const label = v.number || v.vehicle_number || v.plate_number || `ID:${v.id}`;
            fVehicle.innerHTML += `<option value="${v.id}">${label}</option>`;
        });
    } catch (e) {
        console.error('車両読込失敗:', e);
    }
}

function onDriverChange() {
    selectedDriverId = document.getElementById('driverFilter').value;
    loadRecords();
}

// ===== Records =====
async function loadRecords() {
    try {
        let url = `/api/attendance?year=${currentYear}&month=${currentMonth}`;
        if (selectedDriverId) url += `&driver_id=${selectedDriverId}`;
        const res = await fetch(url, { headers: _authH() });
        records = await res.json();
    } catch (e) {
        console.error('勤怠読込失敗:', e);
        records = [];
    }
    renderAll();
}

function renderAll() {
    renderStats();
    renderAlerts();
    renderCalendar();
    renderDriverList();
}

// ===== Stats =====
function renderStats() {
    const workDays = records.filter(r => r.work_type === '通常' || r.work_type === '休日' || r.work_type === '半休').length;
    const totalOvertime = records.reduce((s, r) => s + (r.overtime_minutes || 0), 0);
    const leaveUsed = records.filter(r => r.work_type === '有給').length + records.filter(r => r.work_type === '半休').length * 0.5;

    // Calculate monthly restraint time (clock_in to clock_out for each day)
    let totalRestraintMin = 0;
    records.forEach(r => {
        const cin = r.clock_in || r.start_time;
        const cout = r.clock_out || r.end_time;
        if (cin && cout) {
            const diff = timeDiffMinutes(cin, cout);
            if (diff > 0) totalRestraintMin += diff;
        }
    });

    // Calculate minimum rest period (gap between prev day clock_out and next day clock_in)
    let minRestMinutes = null;
    const sorted = [...records].filter(r => (r.clock_in || r.start_time) && (r.clock_out || r.end_time))
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    for (let i = 1; i < sorted.length; i++) {
        const prevOut = sorted[i - 1].clock_out || sorted[i - 1].end_time;
        const currIn = sorted[i].clock_in || sorted[i].start_time;
        if (prevOut && currIn) {
            const prevDate = sorted[i - 1].date ? sorted[i - 1].date.substring(0, 10) : '';
            const currDate = sorted[i].date ? sorted[i].date.substring(0, 10) : '';
            if (prevDate && currDate) {
                const [ph, pm] = prevOut.split(':').map(Number);
                const [ch, cm] = currIn.split(':').map(Number);
                const prevMs = new Date(prevDate + 'T' + prevOut.substring(0,5)).getTime();
                const currMs = new Date(currDate + 'T' + currIn.substring(0,5)).getTime();
                let restMin = (currMs - prevMs) / 60000;
                // If clock_out was after midnight (next-day scenario), skip negative
                if (restMin > 0 && restMin < 48 * 60) {
                    if (minRestMinutes === null || restMin < minRestMinutes) minRestMinutes = restMin;
                }
            }
        }
    }

    document.getElementById('sDays').textContent = workDays;
    document.getElementById('sOvertime').textContent = (totalOvertime / 60).toFixed(1);
    document.getElementById('sRestraint').textContent = (totalRestraintMin / 60).toFixed(1);
    document.getElementById('sMinRest').textContent = minRestMinutes !== null ? (minRestMinutes / 60).toFixed(1) : '-';
    document.getElementById('sLeaveUsed').textContent = leaveUsed;

    // Leave balance from driver
    if (selectedDriverId) {
        const drv = drivers.find(d => d.id == selectedDriverId);
        const bal = drv && drv.paid_leave_balance != null ? drv.paid_leave_balance : '-';
        document.getElementById('sLeaveBalance').textContent = bal;
    } else {
        document.getElementById('sLeaveBalance').textContent = '-';
    }
}

function renderAlerts() {
    // Hide all alerts first
    document.getElementById('alertRestraint').style.display = 'none';
    document.getElementById('alertOvertimeWarn').style.display = 'none';
    document.getElementById('alertOvertimeDanger').style.display = 'none';
    document.getElementById('alertRestWarn').style.display = 'none';

    if (!selectedDriverId) return;

    // 月間拘束時間 (clock_in to clock_out sum)
    let totalRestraintMin = 0;
    let daysOver13h = 0, daysOver15h = 0;
    records.forEach(r => {
        const cin = r.clock_in || r.start_time;
        const cout = r.clock_out || r.end_time;
        if (cin && cout) {
            const diff = timeDiffMinutes(cin, cout);
            if (diff > 0) {
                totalRestraintMin += diff;
                if (diff > 15 * 60) daysOver15h++;
                else if (diff > 13 * 60) daysOver13h++;
            }
        }
    });
    const restraintHours = totalRestraintMin / 60;

    // Show restraint alert
    if (restraintHours >= 284) {
        document.getElementById('alertRestraint').style.display = 'block';
        document.getElementById('alertRestraint').className = 'alert alert-danger';
        document.getElementById('alertRestraintText').textContent =
            `月間拘束時間 ${restraintHours.toFixed(1)}h（上限284h超過）。1日13h超: ${daysOver13h}日、15h超: ${daysOver15h}日`;
    } else if (restraintHours >= 270) {
        document.getElementById('alertRestraint').style.display = 'block';
        document.getElementById('alertRestraint').className = 'alert alert-warning';
        document.getElementById('alertRestraintText').textContent =
            `月間拘束時間 ${restraintHours.toFixed(1)}h（270h超過、上限284h）。1日13h超: ${daysOver13h}日、15h超: ${daysOver15h}日`;
    } else if (daysOver13h > 0 || daysOver15h > 0) {
        document.getElementById('alertRestraint').style.display = 'block';
        document.getElementById('alertRestraint').className = 'alert alert-info';
        document.getElementById('alertRestraintText').textContent =
            `月間拘束時間 ${restraintHours.toFixed(1)}h。1日13h超: ${daysOver13h}日、15h超: ${daysOver15h}日`;
    }

    // 月間時間外労働
    const totalOvertime = records.reduce((s, r) => s + (r.overtime_minutes || 0), 0);
    if (totalOvertime > 2700) { // > 45h
        document.getElementById('alertOvertimeDanger').style.display = 'block';
        document.getElementById('alertOvertimeDangerText').textContent =
            `月間時間外労働 ${(totalOvertime / 60).toFixed(1)}h（45h超過！直ちに対応が必要）`;
    } else if (totalOvertime > 2400) { // > 40h
        document.getElementById('alertOvertimeWarn').style.display = 'block';
        document.getElementById('alertOvertimeWarnText').textContent =
            `月間時間外労働 ${(totalOvertime / 60).toFixed(1)}h（40h超過、上限45hに注意）`;
    }

    // 休息期間不足 (gap between prev clock_out and next clock_in)
    const sorted = [...records].filter(r => (r.clock_in || r.start_time) && (r.clock_out || r.end_time))
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    let minRestMin = null;
    let daysUnder11h = 0, daysUnder9h = 0;
    for (let i = 1; i < sorted.length; i++) {
        const prevOut = sorted[i - 1].clock_out || sorted[i - 1].end_time;
        const currIn = sorted[i].clock_in || sorted[i].start_time;
        if (prevOut && currIn) {
            const prevDate = sorted[i - 1].date ? sorted[i - 1].date.substring(0, 10) : '';
            const currDate = sorted[i].date ? sorted[i].date.substring(0, 10) : '';
            if (prevDate && currDate) {
                const prevMs = new Date(prevDate + 'T' + prevOut.substring(0,5)).getTime();
                const currMs = new Date(currDate + 'T' + currIn.substring(0,5)).getTime();
                let restMin = (currMs - prevMs) / 60000;
                if (restMin > 0 && restMin < 48 * 60) {
                    if (minRestMin === null || restMin < minRestMin) minRestMin = restMin;
                    if (restMin < 9 * 60) daysUnder9h++;
                    else if (restMin < 11 * 60) daysUnder11h++;
                }
            }
        }
    }
    if (daysUnder9h > 0) {
        document.getElementById('alertRestWarn').style.display = 'block';
        document.getElementById('alertRestWarn').className = 'alert alert-danger';
        document.getElementById('alertRestWarnText').textContent =
            `休息9h未満: ${daysUnder9h}回、11h未満: ${daysUnder11h + daysUnder9h}回（最短: ${minRestMin !== null ? (minRestMin / 60).toFixed(1) : '-'}h）`;
    } else if (daysUnder11h > 0) {
        document.getElementById('alertRestWarn').style.display = 'block';
        document.getElementById('alertRestWarnText').textContent =
            `休息11h未満: ${daysUnder11h}回（最短: ${minRestMin !== null ? (minRestMin / 60).toFixed(1) : '-'}h）`;
    }
}

function timeDiffMinutes(t1, t2) {
    const [h1, m1] = t1.split(':').map(Number);
    const [h2, m2] = t2.split(':').map(Number);
    let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
    if (diff < 0) diff += 24 * 60;
    return diff;
}

function renderCalendar() {
    const section = document.getElementById('calendarSection');
    if (!selectedDriverId) {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';

    // Driver info
    const drv = drivers.find(d => d.id == selectedDriverId);
    if (drv) {
        document.getElementById('diName').textContent = drv.name;
        document.getElementById('diDetail').textContent = `TEL: ${drv.phone || '-'}　Email: ${drv.email || '-'}`;
        const bal = drv.paid_leave_balance != null ? drv.paid_leave_balance : '-';
        document.getElementById('diLeave').textContent = `有給残: ${bal} 日`;
    }

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth - 1, 1);
    const lastDay = new Date(currentYear, currentMonth, 0).getDate();
    // JS: 0=Sun ... 6=Sat. Calendar columns: Mon=0, Tue=1 ... Sun=6
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1;

    // Build record map by date
    const recMap = {};
    records.forEach(r => {
        const d = r.date ? r.date.substring(0, 10) : '';
        if (d) recMap[d] = r;
    });

    // Empty cells before first day
    for (let i = 0; i < startDow; i++) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell empty';
        grid.appendChild(cell);
    }

    const workTypeColors = {
        '通常': '#3b82f6',
        '休日': '#f59e0b',
        '有給': '#22c55e',
        '半休': '#a3e635',
        '欠勤': '#ef4444'
    };

    for (let day = 1; day <= lastDay; day++) {
        const cell = document.createElement('div');
        const dow = (startDow + day - 1) % 7; // 0=Mon ... 6=Sun
        cell.className = 'cal-cell';
        if (dow === 5) cell.classList.add('sat');
        if (dow === 6) cell.classList.add('sun');

        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const rec = recMap[dateStr];

        let html = `<div class="day-num">${day}</div>`;

        if (rec) {
            const color = workTypeColors[rec.work_type] || '#e2e8f0';
            html += `<div class="type-dot" style="background:${color}"></div>`;

            // Show vehicle tag if vehicle info exists
            if (rec.vehicle_id) {
                const vNum = rec.vehicle_number || ('車両' + rec.vehicle_id);
                html += `<span class="vehicle-tag">🚛 ${vNum}</span> `;
            }

            // Show departure_time - return_time if available, otherwise clock_in/clock_out
            const dep = rec.departure_time;
            const ret = rec.return_time;
            const cin = rec.clock_in || rec.start_time || '';
            const cout = rec.clock_out || rec.end_time || '';

            if (dep || ret) {
                html += `<div class="time-text">${dep ? dep.substring(0,5) : '?'} - ${ret ? ret.substring(0,5) : '?'}</div>`;
            } else if (cin || cout) {
                html += `<div class="time-text">${cin ? cin.substring(0,5) : '?'} - ${cout ? cout.substring(0,5) : '?'}</div>`;
            }
            html += `<span class="wtype-label" style="background:${color}">${rec.work_type}</span>`;
        } else {
            html += `<div class="type-dot" style="background:#e2e8f0"></div>`;
        }

        cell.innerHTML = html;
        cell.onclick = () => openEditForDate(dateStr, rec);
        grid.appendChild(cell);
    }

    // Trailing empty cells to complete last row
    const totalCells = startDow + lastDay;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 0; i < remaining; i++) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell empty';
        grid.appendChild(cell);
    }
}

// ===== Save =====
async function saveRecord() {
    const id = document.getElementById('fId').value;

    const allFields = {
        date: document.getElementById('fDate').value,
        driver_id: parseInt(document.getElementById('fDriver').value),
        clock_in: document.getElementById('fStart').value || null,
        clock_out: document.getElementById('fEnd').value || null,
        break_minutes: parseInt(document.getElementById('fBreak').value) || 0,
        work_type: document.getElementById('fWorkType').value,
        vehicle_id: getIntOrNull('fVehicle'),
        distance_km: getFloatOrNull('fDistance'),
        departure_time: getValOrNull('fDeparture'),
        return_time: getValOrNull('fReturn'),
        routes: getValOrNull('fRoutes'),
        pre_check_time: getValOrNull('fPreCheck'),
        post_check_time: getValOrNull('fPostCheck'),
        alcohol_check: getValOrNull('fAlcohol'),
        waiting_time: parseInt(document.getElementById('fWaiting').value) || 0,
        loading_time: parseInt(document.getElementById('fLoading').value) || 0,
        unloading_time: parseInt(document.getElementById('fUnloading').value) || 0,
        fuel_liters: getFloatOrNull('fFuelLiters'),
        fuel_cost: getIntOrNull('fFuelCost'),
        highway_cost: getIntOrNull('fHighwayCost'),
        highway_sections: getValOrNull('fHighwaySections'),
        break_location: getValOrNull('fBreakLocation'),
        weather: getValOrNull('fWeather'),
        allowance: getIntOrNull('fAllowance'),
        incidents: getValOrNull('fIncidents'),
        notes: document.getElementById('fNotes').value || null
    };

    try {
        let res;
        if (id) {
            // Update - send all editable fields (exclude date and driver_id)
            const updatePayload = { ...allFields };
            delete updatePayload.date;
            delete updatePayload.driver_id;
            res = await fetch(`/api/attendance/${id}`, {
                method: 'PUT',
                headers: _authH(),
                body: JSON.stringify(updatePayload)
            });
        } else {
            res = await fetch('/api/attendance', {
                method: 'POST',
                headers: _authH(),
                body: JSON.stringify(allFields)
            });
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || '保存に失敗しました');
        }
        closeModal();
        loadRecords();
    } catch (e) {
        alert(e.message);
    }
}

        r.incidents || '',
        r.overtime_minutes != null ? r.overtime_minutes : '',
        r.night_minutes != null ? r.night_minutes : (r.late_night_minutes != null ? r.late_night_minutes : ''),
        r.notes || ''
    ]);

    const bom = '\uFEFF';
    const csv = bom + [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `勤怠_${currentYear}${String(currentMonth).padStart(2,'0')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<!-- フィードバックモーダル -->
<div id="feedbackOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h3 style="margin:0;font-size:1.1rem">📬 開発への依頼</h3>
            <button onclick="closeFeedbackModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#64748b">&times;</button>
        </div>
        <form id="feedbackForm" onsubmit="submitFeedback(event)">
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">カテゴリ</label>
                <select id="fb-category" required style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                    <option value="機能追加">機能追加</option>
                    <option value="不具合報告">不具合報告</option>
                    <option value="改善要望">改善要望</option>
                    <option value="UI変更">UI変更</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">タイトル</label>
                <input id="fb-title" type="text" required placeholder="依頼の概要を一言で" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box">
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">詳細</label>
                <textarea id="fb-desc" required rows="4" placeholder="具体的な内容を記載してください" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;resize:vertical"></textarea>
            </div>
            <div style="display:flex;gap:12px;margin-bottom:12px">
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">優先度</label>
                    <select id="fb-priority" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">
                        <option>低</option><option selected>普通</option><option>高</option><option>緊急</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">対象ページ</label>
                    <input id="fb-page" type="text" readonly style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;background:#f1f5f9;box-sizing:border-box">
                </div>
            </div>
            <div style="margin-bottom:16px">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:4px">スクリーンショット</label>
                <div id="fb-drop-zone" style="border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer" onclick="document.getElementById('fb-screenshot').click()" ondragover="event.preventDefault();this.style.borderColor='#3b82f6'" ondragleave="this.style.borderColor='#d1d5db'" ondrop="handleScreenshotDrop(event)">
                    <input type="file" id="fb-screenshot" accept="image/*" style="display:none" onchange="previewScreenshot(this)">
                    <div id="fb-drop-text" style="color:#94a3b8;font-size:0.85rem">📎 クリックまたはドラッグ&ドロップで画像を添付</div>
                    <img id="fb-preview" style="display:none;max-width:100%;max-height:150px;border-radius:6px;margin-top:8px">
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="button" onclick="closeFeedbackModal()" style="padding:8px 16px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer">キャンセル</button>
                <button type="submit" id="fb-submit-btn" style="padding:8px 20px;border:none;border-radius:6px;background:#f59e0b;color:#fff;font-weight:600;cursor:pointer">送信</button>
            </div>
        </form>
        <div id="fb-success" style="display:none;text-align:center;padding:30px 0">
            <div style="font-size:2rem;margin-bottom:8px">✅</div>
            <div style="font-weight:600;font-size:1.1rem">依頼を送信しました！</div>
            <div style="color:#64748b;font-size:0.85rem;margin-top:4px">開発チームが確認します</div>
        </div>
    </div>
</div>
<script>
function openFeedbackModal(){const o=document.getElementById('feedbackOverlay');o.style.display='flex';document.getElementById('feedbackForm').style.display='block';document.getElementById('fb-success').style.display='none';document.getElementById('fb-page').value=document.title||location.pathname;document.getElementById('fb-title').value='';document.getElementById('fb-desc').value='';document.getElementById('fb-preview').style.display='none';document.getElementById('fb-drop-text').style.display='block';document.getElementById('fb-screenshot').value='';}
function closeFeedbackModal(){document.getElementById('feedbackOverlay').style.display='none';}
function previewScreenshot(i){if(i.files&&i.files[0]){const r=new FileReader();r.onload=e=>{document.getElementById('fb-preview').src=e.target.result;document.getElementById('fb-preview').style.display='block';document.getElementById('fb-drop-text').style.display='none';};r.readAsDataURL(i.files[0]);}}
function handleScreenshotDrop(e){e.preventDefault();e.currentTarget.style.borderColor='#d1d5db';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const i=document.getElementById('fb-screenshot');const d=new DataTransfer();d.items.add(f);i.files=d.files;previewScreenshot(i);}}
async function submitFeedback(e){e.preventDefault();const b=document.getElementById('fb-submit-btn');b.disabled=true;b.textContent='送信中...';const f=new FormData();f.append('category',document.getElementById('fb-category').value);f.append('title',document.getElementById('fb-title').value);f.append('description',document.getElementById('fb-desc').value);f.append('priority',document.getElementById('fb-priority').value);f.append('page',document.getElementById('fb-page').value);const u=JSON.parse(localStorage.getItem('user')||'{}');f.append('user_name',u.name||'');f.append('user_email',u.email||'');const s=document.getElementById('fb-screenshot').files[0];if(s)f.append('screenshot',s);try{const t=localStorage.getItem('access_token');const h=t?{'Authorization':'Bearer '+t}:{};const r=await fetch('/api/feedback',{method:'POST',headers:h,body:f});if(r.ok){document.getElementById('feedbackForm').style.display='none';document.getElementById('fb-success').style.display='block';setTimeout(closeFeedbackModal,2000);}else{alert('送信に失敗しました');}}catch(x){alert('送信エラー: '+x.message);}b.disabled=false;b.textContent='送信';}
document.getElementById('feedbackOverlay').addEventListener('click',function(e){if(e.target===this)closeFeedbackModal();});
</script>
</body>
</html>
