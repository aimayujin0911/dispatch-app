<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日報管理 - 配車管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
        .topnav { background: #14b8a6; color: #fff; display: flex; align-items: center; padding: 0 1rem; height: 56px; gap: 0; }
        .topnav a { color: rgba(255,255,255,.75); text-decoration: none; padding: .75rem 1rem; font-size: .9rem; white-space: nowrap; }
        .topnav a:hover { color: #fff; background: rgba(255,255,255,.15); }
        .topnav a.active { color: #fff; background: rgba(255,255,255,.25); font-weight: 600; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .toolbar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        select, input, textarea { border: 1px solid #cbd5e1; border-radius: 6px; padding: .5rem .75rem; font-size: .9rem; }
        .card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        th, td { padding: .5rem .6rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8fafc; }
        .btn { display: inline-flex; align-items: center; gap: .3rem; padding: .45rem .9rem; border: none; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #14b8a6; color: #fff; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-outline { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
        .btn:hover { opacity: .85; }
        .route-tag { display: inline-block; background: #f0fdfa; color: #0d9488; padding: .15rem .5rem; border-radius: 4px; font-size: .78rem; margin: .1rem; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 650px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: .85rem; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
        .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
        @media (max-width: 768px) { .topnav { overflow-x: auto; } .form-row, .form-row-3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/">🚛 配車管理</a>
    <a href="/app/billing">💰 請求</a>
    <a href="/app/attendance">⏰ 勤怠</a>
    <a href="/app/accounting">📒 会計</a>
    <a href="/app/reports" class="active">📝 日報</a>
</nav>
<div class="container">
    <h1>日報管理</h1>
    <div class="toolbar">
        <input type="date" id="targetDate" onchange="loadReports()">
        <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
        <button class="btn btn-success" onclick="autoGenerate()">🔄 配車から自動生成</button>
        <button class="btn btn-outline" onclick="printDaily()">🖨️ 日報印刷</button>
    </div>
    <div class="card" style="overflow-x:auto">
        <table>
            <thead><tr>
                <th>日付</th><th>ドライバー</th><th>出発</th><th>帰着</th><th>待機</th><th>積込</th><th>荷卸</th><th>走行km</th><th>給油L</th><th>荷主</th><th>運行経路</th><th>備考</th><th>操作</th>
            </tr></thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="formModal">
    <div class="modal">
        <h2 id="formTitle">日報追加</h2>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group"><label>日付</label><input type="date" id="fDate"></div>
            <div class="form-group"><label>ドライバー</label><select id="fDriver"></select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>出発時刻</label><input type="time" id="fDeparture"></div>
            <div class="form-group"><label>帰着時刻</label><input type="time" id="fReturn"></div>
        </div>
        <div class="form-row-3">
            <div class="form-group"><label>待機時間(分)</label><input type="number" id="fWaiting" value="0"></div>
            <div class="form-group"><label>積込時間(分)</label><input type="number" id="fLoading" value="0"></div>
            <div class="form-group"><label>荷卸時間(分)</label><input type="number" id="fUnloading" value="0"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>走行距離(km)</label><input type="number" id="fDistance" step="0.1"></div>
            <div class="form-group"><label>給油量(L)</label><input type="number" id="fFuel" step="0.1"></div>
        </div>
        <div class="form-group"><label>荷主</label><input type="text" id="fClient"></div>
        <div class="form-group">
            <label>運行経路 (JSON: [{"pickup":"...","delivery":"..."},...])</label>
            <textarea id="fRoutes" rows="3" placeholder='[{"pickup":"東京","delivery":"大阪"}]'></textarea>
        </div>
        <div class="form-group"><label>備考</label><textarea id="fNotes" rows="2"></textarea></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('formModal')">キャンセル</button>
            <button class="btn btn-primary" onclick="saveReport()">保存</button>
        </div>
    </div>
</div>

<script>
async function apiGet(u){const r=await fetch(u);if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPost(u,d){const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiPut(u,d){const r=await fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(r.statusText);return r.json();}
async function apiDelete(u){const r=await fetch(u,{method:'DELETE'});if(!r.ok)throw new Error(r.statusText);return r.json();}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

let reports = [], drivers = [];

function initDate(){
    const d = new Date();
    document.getElementById('targetDate').value = d.toISOString().slice(0,10);
}

async function loadDrivers(){
    try {
        const data = await apiGet('/api/drivers');
        drivers = Array.isArray(data) ? data : (data.drivers || []);
        document.getElementById('fDriver').innerHTML = drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
    } catch(e){console.error(e);}
}

async function loadReports(){
    try {
        const date = document.getElementById('targetDate').value;
        let url = '/api/reports';
        if(date) url += `?date=${date}`;
        const data = await apiGet(url);
        reports = Array.isArray(data) ? data : (data.reports || []);
        renderTable();
    } catch(e){console.error(e);}
}

function parseRoutes(r){
    if(!r) return '';
    try {
        const routes = typeof r === 'string' ? JSON.parse(r) : r;
        if(!Array.isArray(routes)) return String(r);
        return routes.map(rt => `<span class="route-tag">${rt.pickup||'?'} → ${rt.delivery||'?'}</span>`).join(' ');
    } catch(e){ return String(r); }
}

function driverName(id){ const d=drivers.find(x=>x.id===id); return d?d.name:'-'; }

function renderTable(){
    document.getElementById('tblBody').innerHTML = reports.map(r => `<tr>
        <td>${r.date||'-'}</td>
        <td>${r.driver_name||driverName(r.driver_id)}</td>
        <td>${r.departure_time||'-'}</td><td>${r.return_time||'-'}</td>
        <td>${r.waiting_time||0}</td><td>${r.loading_time||0}</td><td>${r.unloading_time||0}</td>
        <td>${r.distance_km||'-'}</td><td>${r.fuel_amount||'-'}</td>
        <td>${r.client_name||'-'}</td>
        <td>${parseRoutes(r.routes)}</td>
        <td>${r.notes||''}</td>
        <td style="white-space:nowrap">
            <button class="btn btn-outline" style="padding:.2rem .5rem;font-size:.78rem" onclick="editReport(${r.id})">編集</button>
            <button class="btn btn-danger" style="padding:.2rem .5rem;font-size:.78rem" onclick="deleteReport(${r.id})">削除</button>
        </td>
    </tr>`).join('');
}

function openAddModal(){
    document.getElementById('editId').value='';
    document.getElementById('formTitle').textContent='日報追加';
    document.getElementById('fDate').value=document.getElementById('targetDate').value;
    ['fDeparture','fReturn','fClient','fNotes'].forEach(id=>document.getElementById(id).value='');
    ['fWaiting','fLoading','fUnloading'].forEach(id=>document.getElementById(id).value=0);
    document.getElementById('fDistance').value='';
    document.getElementById('fFuel').value='';
    document.getElementById('fRoutes').value='';
    openModal('formModal');
}

function editReport(id){
    const r=reports.find(x=>x.id===id); if(!r) return;
    document.getElementById('editId').value=id;
    document.getElementById('formTitle').textContent='日報編集';
    document.getElementById('fDate').value=r.date||'';
    document.getElementById('fDriver').value=r.driver_id||'';
    document.getElementById('fDeparture').value=r.departure_time||'';
    document.getElementById('fReturn').value=r.return_time||'';
    document.getElementById('fWaiting').value=r.waiting_time||0;
    document.getElementById('fLoading').value=r.loading_time||0;
    document.getElementById('fUnloading').value=r.unloading_time||0;
    document.getElementById('fDistance').value=r.distance_km||'';
    document.getElementById('fFuel').value=r.fuel_amount||'';
    document.getElementById('fClient').value=r.client_name||'';
    document.getElementById('fRoutes').value=typeof r.routes==='string'?r.routes:JSON.stringify(r.routes||[]);
    document.getElementById('fNotes').value=r.notes||'';
    openModal('formModal');
}

async function saveReport(){
    const id=document.getElementById('editId').value;
    let routes=document.getElementById('fRoutes').value;
    try { routes=JSON.parse(routes); } catch(e){ routes=[]; }
    const payload={
        date:document.getElementById('fDate').value,
        driver_id:parseInt(document.getElementById('fDriver').value),
        departure_time:document.getElementById('fDeparture').value,
        return_time:document.getElementById('fReturn').value,
        waiting_time:parseInt(document.getElementById('fWaiting').value)||0,
        loading_time:parseInt(document.getElementById('fLoading').value)||0,
        unloading_time:parseInt(document.getElementById('fUnloading').value)||0,
        distance_km:parseFloat(document.getElementById('fDistance').value)||0,
        fuel_amount:parseFloat(document.getElementById('fFuel').value)||0,
        client_name:document.getElementById('fClient').value,
        routes:routes,
        notes:document.getElementById('fNotes').value,
    };
    if(id) await apiPut(`/api/reports/${id}`,payload);
    else await apiPost('/api/reports',payload);
    closeModal('formModal'); loadReports();
}

async function deleteReport(id){if(!confirm('削除しますか？'))return; await apiDelete(`/api/reports/${id}`); loadReports();}

async function autoGenerate(){
    const date=document.getElementById('targetDate').value;
    if(!date) return alert('日付を選択してください');
    if(!confirm(`${date}の日報を配車データから自動生成しますか？`)) return;
    await apiPost(`/api/reports/auto-generate?target_date=${date}`,{});
    loadReports();
}

function printDaily(){
    const date=document.getElementById('targetDate').value;
    const win=window.open('','_blank');
    win.document.write(`<html><head><meta charset="UTF-8"><title>日報 ${date}</title><style>
        body{font-family:sans-serif;padding:2rem}table{width:100%;border-collapse:collapse;margin-top:1rem}
        th,td{border:1px solid #ccc;padding:.5rem;text-align:left;font-size:.85rem}th{background:#f0f0f0}
        h1{font-size:1.3rem}@media print{button{display:none}}</style></head><body>
        <h1>運行日報 ${date}</h1>
        <table><thead><tr><th>ドライバー</th><th>出発</th><th>帰着</th><th>走行km</th><th>給油L</th><th>荷主</th><th>経路</th><th>備考</th></tr></thead><tbody>
        ${reports.map(r=>`<tr><td>${r.driver_name||driverName(r.driver_id)}</td><td>${r.departure_time||'-'}</td><td>${r.return_time||'-'}</td><td>${r.distance_km||'-'}</td><td>${r.fuel_amount||'-'}</td><td>${r.client_name||'-'}</td><td>${routesText(r.routes)}</td><td>${r.notes||''}</td></tr>`).join('')}
        </tbody></table><button onclick="window.print()">印刷</button></body></html>`);
}

function routesText(r){
    try{const arr=typeof r==='string'?JSON.parse(r):r;if(!Array.isArray(arr))return String(r||'');return arr.map(rt=>`${rt.pickup||'?'}→${rt.delivery||'?'}`).join(', ');}catch(e){return String(r||'');}
}

initDate(); loadDrivers().then(()=>loadReports());
</script>
</body>
</html>
